function categoriaColor(cat) {
  const colors = {
    "Nuraghe": "#c28b3b",
    "Nuraghe complesso": "#c28b3b",
    "Villaggio nuragico": "#c28b3b",
    "Borgo": "#d6a85b",
    "Domus de Janas": "#a33b3b",
    "Tomba dei giganti": "#555b66",
    "Tombe dei giganti": "#555b66",
    "Pozzo sacro": "#2fa7b8",
    "Fauna identitaria": "#3b7a4a"
  };
  return colors[cat] || "#ffffff";
}

const map = L.map("map").setView([40.0, 9.0], 7);

L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
  maxZoom: 18
}).addTo(map);

pois.forEach(poi => {
  const icon = L.divIcon({
    className: "",
    html: `<div class="custom-marker" style="border-color:${categoriaColor(poi.categoria)}"></div>`,
    iconSize: [14, 14],
    iconAnchor: [7, 7]
  });

  const marker = L.marker([poi.lat, poi.lng], { icon }).addTo(map);

  marker.on("click", () => {
    map.setView([poi.lat, poi.lng], 11);
    openPoiPanel(poi);
  });
});

const panel = document.getElementById("poiPanel");
const poiTitle = document.getElementById("poiTitle");
const poiSubtitle = document.getElementById("poiSubtitle");
const poiCategoryPill = document.getElementById("poiCategoryPill");
const poiWikivoyage = document.getElementById("poiWikivoyage");
const poiWikiloc = document.getElementById("poiWikiloc");
const poiLogistica = document.getElementById("poiLogistica");

function openPoiPanel(poi) {
  poiTitle.textContent = poi.nome;
  poiSubtitle.textContent = poi.comune;
  poiCategoryPill.textContent = poi.categoria;
  poiCategoryPill.style.backgroundColor = categoriaColor(poi.categoria);

  const q = encodeURIComponent(poi.nome + " " + poi.comune + " Sardegna");
  poiWikivoyage.href = "https://it.wikivoyage.org/w/index.php?search=" + q;
  poiWikiloc.href = "https://www.wikiloc.com/it/percorsi/outdoor/" + q;

  poiLogistica.innerHTML = `
    <div class="poi-logistica-item">
      📞 <a href="tel:${poi.telefono}">Chiama cooperativa / info</a>
    </div>
  `;

  panel.classList.add("visible");
}

document.getElementById("poiClose").onclick = () => {
  panel.classList.remove("visible");
};
